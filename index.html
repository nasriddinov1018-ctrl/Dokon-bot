<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lavash Ustasi — Premium Buyurtma</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E0C0A;
    --surface: #17140F;
    --surface2: #1F1B15;
    --ink: #F4EEE3;
    --ink-dim: #A89C8A;
    --gold: #E3A53D;
    --gold-soft: #F0C36B;
    --line: #2B251D;
    --radius: 16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    padding-bottom: 110px;
    overscroll-behavior-y: contain;
  }

  /* ===== Hero ===== */
  .hero{
    position:relative;
    height: 280px;
    background-image: url('images/hero-bg.jpg');
    background-size: cover;
    background-position: center 32%;
  }
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(14,12,10,.10) 0%, rgba(14,12,10,.55) 55%, rgba(14,12,10,.98) 100%);
  }
  .hero-content{
    position:absolute; left:20px; right:20px; bottom:16px; z-index:2;
  }
  .hero .eyebrow{
    text-transform: uppercase;
    letter-spacing: .14em;
    font-size: 11px;
    color: var(--gold-soft);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .hero h1{
    font-family:'Archivo Black', sans-serif;
    font-size: 30px;
    color:#fff;
    margin: 0 0 6px;
    line-height: 1.05;
    text-shadow: 0 2px 14px rgba(0,0,0,.45);
  }
  .hero p{
    margin:0;
    font-size: 13px;
    color: rgba(255,255,255,.8);
  }
  .hero .meta{
    display:flex; align-items:center; gap:6px;
    margin-top: 9px;
    font-size: 12.5px;
    font-weight: 700;
  }
  .hero .meta .gold{ color: var(--gold-soft); }
  .hero .meta .dim{ color: rgba(255,255,255,.62); font-weight:500; }

  /* ===== Categories ===== */
  .categories{
    position: sticky;
    top: 0;
    z-index: 25;
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding: 14px 18px;
    background: rgba(14,12,10,.94);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    scrollbar-width:none;
  }
  .categories::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;
    padding: 7px 16px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-dim);
    white-space:nowrap;
    cursor:pointer;
  }
  .pill.active{
    background: var(--gold);
    border-color: var(--gold);
    color: #1B1304;
  }

  /* ===== Grid / Cards ===== */
  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 16px 18px 18px;
  }
  .card{
    background: var(--surface);
    border-radius: var(--radius);
    overflow:hidden;
    animation: rise .35s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform: translateY(8px);}
    to{opacity:1; transform: translateY(0);}
  }
  .img-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 1/1;
    background: var(--surface2);
  }
  .img-wrap img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .img-fallback{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size: 34px;
  }
  .add-fab{
    position:absolute; right:8px; bottom:8px;
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background: var(--gold);
    color:#1B1304;
    font-size:18px;
    font-weight:800;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,.4);
  }
  .stepper-fab{
    position:absolute; right:8px; bottom:8px;
    display:flex; align-items:center;
    background: var(--gold);
    border-radius:999px;
    padding: 2px;
    box-shadow: 0 4px 10px rgba(0,0,0,.4);
  }
  .stepper-fab button{
    width:26px; height:26px;
    border:none; background:none;
    color:#1B1304;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
  }
  .stepper-fab .qty{
    min-width:16px;
    text-align:center;
    font-size:12px;
    font-weight:800;
    color:#1B1304;
  }
  .card .body{ padding: 10px 12px 12px; }
  .card .name{
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.25;
  }
  .card .price{
    font-size: 13.5px;
    font-weight: 800;
    color: var(--gold-soft);
  }

  /* ===== Cart ticket ===== */
  .cart-ticket{
    position: fixed;
    left: 14px; right:14px; bottom: 14px;
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 13px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    transform: translateY(120%);
    transition: transform .25s ease;
    z-index: 30;
    cursor:pointer;
  }
  .cart-ticket.show{ transform: translateY(0); }
  .cart-ticket .count{
    background: var(--gold);
    color:#1B1304;
    font-weight:800;
    font-size:12px;
    padding: 3px 9px;
    border-radius: 999px;
    margin-right:10px;
  }
  .cart-ticket .label{ font-size: 13.5px; font-weight:600; flex-grow:1; color:var(--ink);}
  .cart-ticket .total{ font-weight:800; font-size:15px; color: var(--gold-soft); }

  /* ===== Drawer ===== */
  .overlay{
    position:fixed; inset:0;
    background: rgba(0,0,0,.6);
    opacity:0; pointer-events:none;
    transition: opacity .2s ease;
    z-index: 40;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .drawer{
    position:fixed;
    left:0; right:0; bottom:0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--line);
    padding: 18px 18px 28px;
    transform: translateY(105%);
    transition: transform .28s ease;
    z-index: 50;
    max-height: 80vh;
    overflow-y:auto;
  }
  .drawer.show{ transform: translateY(0); }
  .drawer h2{
    font-family:'Archivo Black', sans-serif;
    font-size:18px;
    margin: 4px 0 14px;
    color: var(--ink);
  }
  .cart-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .cart-row img.thumb, .cart-row .thumb-fallback{
    width:42px; height:42px;
    border-radius:10px;
    object-fit:cover;
    flex:0 0 auto;
    background: var(--surface2);
  }
  .cart-row .thumb-fallback{
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
  }
  .cart-row .info{ flex-grow:1; }
  .cart-row .name{ font-weight:700; font-size:13px; color:var(--ink); margin-bottom:2px;}
  .cart-row .price{ font-size:12px; color:var(--ink-dim); font-weight:600;}
  .remove{
    background:none; border:none;
    color: #D9694A;
    font-size:11.5px;
    font-weight:700;
    cursor:pointer;
  }
  .location-btn{
    width:100%;
    margin-top:12px;
    border:1px solid var(--gold);
    background: transparent;
    color: var(--gold-soft);
    font-weight:700;
    font-size:13px;
    padding: 11px 0;
    border-radius: 12px;
    cursor:pointer;
  }
  .location-chip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-top:12px;
    background: var(--surface2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    font-size:12px;
    font-weight:600;
    color: var(--gold-soft);
  }
  .location-chip button{
    background:none; border:none;
    color: #D9694A;
    font-size:11.5px;
    font-weight:700;
    cursor:pointer;
    flex:0 0 auto;
  }
  textarea{
    width:100%;
    margin-top:12px;
    border-radius: 12px;
    border: 1px solid var(--line);
    padding: 10px 12px;
    font-family:'Manrope', sans-serif;
    font-size:13px;
    resize:none;
    background: var(--surface2);
    color: var(--ink);
  }
  textarea::placeholder{ color: var(--ink-dim); }
  .subtotal{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin: 16px 0 4px;
    font-weight:800;
    font-size:16px;
    color: var(--ink);
  }
  .order-btn{
    width:100%;
    border:none;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#1B1304;
    font-weight:800;
    font-size:14.5px;
    padding: 14px 0;
    border-radius: 14px;
    margin-top: 10px;
    cursor:pointer;
  }
  .empty{
    text-align:center;
    color: var(--ink-dim);
    font-size:13.5px;
    padding: 30px 0;
  }

  /* ===== Map picker ===== */
  .map-overlay{
    position:fixed; inset:0;
    background: var(--bg);
    z-index: 60;
    display:flex;
    flex-direction:column;
    transform: translateY(100%);
    transition: transform .28s ease;
  }
  .map-overlay.show{ transform: translateY(0); }
  .map-header{
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--line);
    flex:0 0 auto;
  }
  .map-header h3{
    font-family:'Archivo Black', sans-serif;
    font-size:16px;
    margin:0;
    color: var(--ink);
  }
  .map-header button{
    border:none; background:none;
    font-size:22px;
    color: var(--ink-dim);
    cursor:pointer;
  }
  #mapContainer{ flex-grow:1; }
  .map-footer{
    padding: 14px 18px 24px;
    border-top: 1px solid var(--line);
    flex:0 0 auto;
  }
  .map-hint{
    font-size:12px;
    color: var(--ink-dim);
    text-align:center;
    margin: 0 0 10px;
  }
  .confirm-location-btn{
    width:100%;
    border:none;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#1B1304;
    font-weight:800;
    font-size:14.5px;
    padding: 14px 0;
    border-radius: 14px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="hero" id="hero">
  <div class="hero-content">
    <div class="eyebrow">Premium buyurtma</div>
    <h1 id="shopName">Lavash Ustasi</h1>
    <p id="shopTagline">Issiq lavash, burger va fast-food — 20 daqiqada tayyor</p>
    <div class="meta">
      <span class="gold">⭐ <span id="shopRating">4.9</span></span>
      <span class="dim">·</span>
      <span class="dim" id="shopOrders">500+ buyurtma</span>
    </div>
  </div>
</div>

<nav class="categories" id="categories"></nav>
<main class="grid" id="productGrid"></main>

<div class="cart-ticket" id="cartTicket">
  <span class="count" id="cartCount">0</span>
  <span class="label">Savat</span>
  <span class="total" id="cartTotal">0 so'm</span>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="cartDrawer">
  <h2>Savatingiz</h2>
  <div id="cartItems"></div>
  <button class="location-btn" id="pickLocationBtn">📍 Manzilni xaritadan tanlash</button>
  <div class="location-chip" id="locationChip" style="display:none;">
    <span id="locationChipText">📍 Manzil tanlandi</span>
    <button id="changeLocationBtn">O'zgartirish</button>
  </div>
  <textarea id="noteField" rows="2" placeholder="Qo'shimcha izoh: xonadon raqami, telefon va h.k. (ixtiyoriy)"></textarea>
  <div class="subtotal">
    <span>Jami</span>
    <span id="drawerTotal">0 so'm</span>
  </div>
  <button class="order-btn" id="submitOrder">Buyurtma berish</button>
</div>

<div class="map-overlay" id="mapOverlay">
  <div class="map-header">
    <h3>Manzilni tanlang</h3>
    <button id="closeMapBtn">✕</button>
  </div>
  <div id="mapContainer"></div>
  <div class="map-footer">
    <p class="map-hint">Xaritani suring yoki bossangiz, belgi (pin) o'sha joyga ko'chadi</p>
    <button class="confirm-location-btn" id="confirmLocationBtn">Shu manzilni tasdiqlash</button>
  </div>
</div>

<script>
/* ======================================================
   SOZLASH BO'LIMI — har bir yangi mijoz (do'kon) uchun
   FAQAT shu bo'limni o'zgartiring.
   img maydoni: "images/fayl-nomi.jpg" — shu repo ichidagi
   "images" papkasiga yuklangan rasm fayli nomi.
   Rasm bo'lmasa yoki yuklanmasa, avtomatik emoji ko'rsatiladi.
   ====================================================== */
const CONFIG = {
  shopName: "Lavash Ustasi",
  shopTagline: "Issiq lavash, burger va fast-food — 20 daqiqada tayyor",
  shopRating: "4.9",
  shopOrders: "500+ buyurtma",
  // Buyurtma matni shu Telegram username'ga (do'kon egasiga) boradi:
  shopTelegramUsername: "nasriddinov1018", // @ belgisisiz yozing
  currency: "so'm"
};

const PRODUCTS = [
  { id: 1,  cat: "Lavashlar",      emoji: "🌯",        name: "Lavash (tovuq go'shtli)",  desc: "", price: 28000 },
  { id: 2,  cat: "Lavashlar",      emoji: "🌯",       name: "Lavash (mol go'shtli)",    desc: "", price: 30000 },
  { id: 3,  cat: "Lavashlar",      emoji: "🌯",     name: "Aralash lavash",           desc: "", price: 32000 },
  { id: 4,  cat: "Lavashlar",      emoji: "🌯",   name: "Chizburger lavash",        desc: "", price: 30000 },
  { id: 5,  cat: "Lavashlar",      emoji: "🌯",     name: "Achchiqli lavash",         desc: "", price: 29000 },

  { id: 6,  cat: "Burgerlar",     emoji: "🍔" ,    name: "Klassik burger",           desc: "", price: 26000 },
  { id: 7,  cat: "Burgerlar",      emoji: "🍔",       name: "Chizburger",               desc: "", price: 28000 },
  { id: 8,  cat: "Burgerlar",      emoji: "🍔",      name: "Double burger",            desc: "", price: 36000 },
  { id: 9,  cat: "Burgerlar",      emoji: "🍔",         name: "BBQ burger",               desc: "", price: 32000 },
  { id: 10, cat: "Burgerlar",      emoji: "🍔",       name: "Tovuq burger",             desc: "", price: 27000 },

  { id: 11, cat: "Hot Dog",        emoji: "🌭",      name: "Klassik hot dog",          desc: "", price: 20000 },
  { id: 12, cat: "Hot Dog",        emoji: "🌭",      name: "Achchiqli hot dog",        desc: "", price: 22000 },
  { id: 13, cat: "Hot Dog",        emoji: "🌭",    name: "Pishloqli hot dog",        desc: "", price: 22000 },
  { id: 14, cat: "Hot Dog",        emoji: "🌭",          name: "BBQ hot dog",              desc: "", price: 24000 },
  { id: 15, cat: "Hot Dog",        emoji: "🌭",        name: "Tovuq hot dog",            desc: "", price: 22000 },

  { id: 16, cat: "Pizza",          emoji: "🍕",   name: "Margarita",                desc: "", price: 45000 },
  { id: 17, cat: "Pizza",          emoji: "🍕",     name: "Pepperoni",                desc: "", price: 55000 },
  { id: 18, cat: "Pizza",          emoji: "🍕",       name: "Tovuqli pizza",            desc: "", price: 55000 },
  { id: 19, cat: "Pizza",          emoji: "🍕",  name: "Mol go'shtli pizza",       desc: "", price: 60000 },
  { id: 20, cat: "Pizza",          emoji: "🍕",       name: "Aralash pizza",            desc: "", price: 60000 },

  { id: 21, cat: "Qo'shimchalar",  emoji: "🍟",    name: "Kartoshka fri",           desc: "", price: 15000 },
  { id: 22, cat: "Qo'shimchalar",  emoji: "🍗",     name: "Naggetslar",              desc: "", price: 20000 },
  { id: 23, cat: "Qo'shimchalar",  emoji: "🥔",      name: "Sipsi",                   desc: "", price: 15000 },
  { id: 24, cat: "Qo'shimchalar",  emoji: "🧅",      name: "Piyoz halqalari",         desc: "", price: 15000 },
  { id: 25, cat: "Qo'shimchalar",  emoji: "🧀", name: "Mozzarella stik",         desc: "", price: 20000 },

  { id: 26, cat: "Ichimliklar",    emoji: "🥤",           name: "Coca-Cola 0.5L",          desc: "", price: 10000 },
  { id: 27, cat: "Ichimliklar",    emoji: "🥤",          name: "Fanta 0.5L",              desc: "", price: 10000 },
  { id: 28, cat: "Ichimliklar",    emoji: "🥤",         name: "Sprite 0.5L",             desc: "", price: 10000 },
  { id: 29, cat: "Ichimliklar",    emoji: "🥤",          name: "Pepsi 0.5L",              desc: "", price: 10000 },
  { id: 30, cat: "Ichimliklar",    emoji: "🧃",          name: "Ayron 0.5L",              desc: "", price: 8000 },
  { id: 31, cat: "Ichimliklar",    emoji: "💧",            name: "Su 0.5L",                 desc: "", price: 5000 }
];
/* ====================================================== */

const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

document.getElementById('shopName').textContent = CONFIG.shopName;
document.getElementById('shopTagline').textContent = CONFIG.shopTagline;
document.getElementById('shopRating').textContent = CONFIG.shopRating;
document.getElementById('shopOrders').textContent = CONFIG.shopOrders;

let activeCategory = "Hammasi";
let cart = {}; // id -> qty

const categories = ["Hammasi", ...new Set(PRODUCTS.map(p => p.cat))];

function fmt(n){ return n.toLocaleString('uz-UZ') + " " + CONFIG.currency; }

function renderCategories(){
  const wrap = document.getElementById('categories');
  wrap.innerHTML = "";
  categories.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'pill' + (cat === activeCategory ? ' active' : '');
    pill.textContent = cat;
    pill.onclick = () => { activeCategory = cat; renderCategories(); renderGrid(); };
    wrap.appendChild(pill);
  });
}

function renderGrid(){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = "";
  const items = activeCategory === "Hammasi" ? PRODUCTS : PRODUCTS.filter(p => p.cat === activeCategory);
  items.forEach(p => {
    const qty = cart[p.id] || 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="img-wrap">
        ${p.img
          ? `<img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" data-emoji="${p.emoji}">`
          : `<div class="img-fallback">${p.emoji}</div>`
        }
        ${qty > 0
          ? `<div class="stepper-fab">
               <button data-action="dec" data-id="${p.id}">−</button>
               <span class="qty">${qty}</span>
               <button data-action="inc" data-id="${p.id}">+</button>
             </div>`
          : `<button class="add-fab" data-action="add" data-id="${p.id}">+</button>`
        }
      </div>
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="price">${fmt(p.price)}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('img.product-img').forEach(img => {
    img.addEventListener('error', () => {
      const fb = document.createElement('div');
      fb.className = 'img-fallback';
      fb.textContent = img.dataset.emoji;
      img.replaceWith(fb);
    });
  });

  grid.querySelectorAll('button[data-action]').forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.id);
      const action = btn.dataset.action;
      if (action === 'add' || action === 'inc') cart[id] = (cart[id] |
